version: "3"

tasks:
  test:
    desc: "Run oj sample tests (task oj-test DIR=abc380/a)"
    dir: "{{.DIR | default .USER_WORKING_DIR}}"
    cmds:
      - go build -o a.out .
      - oj test -c ./a.out -d tests
      - rm -f a.out

  fetch:
    desc: "Fetch sample tests with oj (task fetch URL=https://atcoder.jp/contests/abc380/tasks/abc380_a)"
    dir: "{{.DIR | default .USER_WORKING_DIR}}"
    cmds:
      - oj download -d tests {{.URL}}
    requires:
      vars: [URL]

  new:
    desc: "Create problem directory and fetch tests (task new CONTEST=abc380 PROBLEM=a)"
    vars:
      PROBLEM_DIR: "{{.USER_WORKING_DIR}}/{{.CONTEST}}/{{.PROBLEM}}"
      TASK_ID: "{{.CONTEST}}_{{.PROBLEM}}"
      URL: "https://atcoder.jp/contests/{{.CONTEST}}/tasks/{{.CONTEST}}_{{.PROBLEM}}"
    cmds:
      - mkdir -p "{{.PROBLEM_DIR}}"
      - sed -e 's/CONTEST_ID/{{.CONTEST}}/g' -e 's/TASK_ID/{{.TASK_ID}}/g' "{{.TASKFILE_DIR}}/template/main.go" > "{{.PROBLEM_DIR}}/main.go"
      - cp "{{.TASKFILE_DIR}}/template/main_test.go" "{{.PROBLEM_DIR}}/main_test.go"
      - oj download -d "{{.PROBLEM_DIR}}/tests" "{{.URL}}"
    requires:
      vars: [CONTEST, PROBLEM]

  login:
    desc: "Login to AtCoder via oj (task login USERNAME=xxx PASSWORD=xxx)"
    cmds:
      - oj login --use-browser never -u {{.USERNAME}} -p {{.PASSWORD}} https://atcoder.jp
    requires:
      vars: [USERNAME, PASSWORD]

  today:
    desc: "Create today's directory"
    vars:
      TODAY_DIR: '{{.TASKFILE_DIR}}/{{now | date "2006/01/02"}}'
    cmds:
      - mkdir -p "{{.TODAY_DIR}}"
      # TODAY_DIR がコピーされるので、そのまま cd (cmd+v)で移動
      - echo "{{.TODAY_DIR}}" | pbcopy
